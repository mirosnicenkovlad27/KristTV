<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ведущие</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background: radial-gradient(circle,#1a0533,#0a0a1a); font-family:Arial,sans-serif; color:white; display:flex; justify-content:center; align-items:center; padding:20px; }
.card { background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); padding:40px 30px; border-radius:40px; border:2px solid rgba(255,255,255,0.15); max-width:600px; width:100%; box-shadow:0 0 60px rgba(153,0,255,0.3); }
h1 { text-align:center; font-size:34px; text-shadow:0 0 20px #ff00c8; margin-bottom:30px; }
.host { display:flex; align-items:center; gap:20px; background:rgba(255,255,255,0.08); padding:15px 20px; border-radius:20px; margin:15px 0; }
.host .avatar { width:60px; height:60px; border-radius:50%; background:linear-gradient(45deg,#ff00c8,#9900ff); display:flex; justify-content:center; align-items:center; font-size:30px; }
.host .info .name { font-size:22px; font-weight:bold; }
.host .info .role { color:#aaaaff; font-size:16px; }
.back { display:inline-block; margin-top:30px; padding:15px 40px; background:rgba(255,255,255,0.15); border-radius:60px; color:white; text-decoration:none; text-align:center; width:100%; }
</style>
</head>
<body>
<div class="card">
<h1>🎤 Наши ведущие</h1>
<div class="host"><div class="avatar">👨</div><div class="info"><div class="name">Крист</div><div class="role">Основатель, главный ведущий</div></div></div>
<div class="host"><div class="avatar">👩</div><div class="info"><div class="name">Анна</div><div class="role">Ведущая утреннего шоу</div></div></div>
<div class="host"><div class="avatar">🧑</div><div class="info"><div class="name">Артём</div><div class="role">Игровой стример</div></div></div>
<div class="host"><div class="avatar">👩‍🦰</div><div class="info"><div class="name">Елена</div><div class="role">Ведущая новостей</div></div></div>
<a href="index.html" class="back">← На главную</a>
</div>
</body>
</html>
