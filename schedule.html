<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Расписание</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { min-height:100vh; background: radial-gradient(circle,#0a0015,#1a0533,#0a0a1a); font-family:'Segoe UI',Arial,sans-serif; color:white; display:flex; justify-content:center; align-items:center; padding:20px; animation:fadeIn 0.8s ease-in; }
@keyframes fadeIn { 0%{opacity:0;transform:translateY(30px);} 100%{opacity:1;transform:translateY(0);} }
@keyframes slideIn { 0%{opacity:0;transform:translateX(-30px);} 100%{opacity:1;transform:translateX(0);} }
.card { background:rgba(0,0,0,0.7); backdrop-filter:blur(20px); padding:40px 30px; border-radius:50px; border:2px solid rgba(255,255,255,0.1); max-width:600px; width:100%; box-shadow:0 0 80px rgba(153,0,255,0.2); }
h1 { text-align:center; font-size:34px; text-shadow:0 0 30px #ff00c8; margin-bottom:30px; animation:glow 3s infinite; }
@keyframes glow { 0%,100%{text-shadow:0 0 20px #ff00c8;} 50%{text-shadow:0 0 60px #ff00c8,0 0 120px #9900ff;} }
.item { background:rgba(255,255,255,0.06); padding:18px 20px; border-radius:25px; margin:15px 0; border-left:5px solid #ff00c8; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; animation:slideIn 0.6s ease-out; transition:0.3s; }
.item:hover { background:rgba(255,0,200,0.15); transform:scale(1.02); border-color:#ffcc00; box-shadow:0 0 30px rgba(255,0,200,0.2); }
.time { font-size:28px; font-weight:bold; color:#ffcc00; text-shadow:0 0 20px #ffcc00; }
.name { font-size:18px; color:#ddd; }
.back { display:inline-block; margin-top:30px; padding:15px 40px; background:rgba(255,255,255,0.08); border-radius:60px; color:white; text-decoration:none; text-align:center; width:100%; transition:0.3s; border:1px solid rgba(255,255,255,0.05); }
.back:hover { background:rgba(255,0,200,0.2); transform:scale(1.02); box-shadow:0 0 40px rgba(255,0,200,0.3); }
</style>
</head>
<body>
<div class="card">
<h1>📅 Расписание</h1>
<div class="item"><span class="time">8:00</span><span class="name">🏠 Доброе утро</span></div>
<div class="item"><span class="time">10:00</span><span class="name">🎮 Игровой стрим</span></div>
<div class="item"><span class="time">12:00</span><span class="name">🍳 Кулинарный мастер-класс</span></div>
<div class="item"><span class="time">14:00</span><span class="name">💬 Чат с подписчиками</span></div>
<div class="item"><span class="time">16:00</span><span class="name">🎬 Фильм дня</span></div>
<div class="item"><span class="time">18:00</span><span class="name">📰 Вечерние новости</span></div>
<div class="item"><span class="time">20:00</span><span class="name">🎤 Концерт по заявкам</span></div>
<div class="item"><span class="time">22:00</span><span class="name">🌙 Ночной эфир</span></div>
<a href="index.html" class="back">← На главную</a>
</div>
</body>
</html>
