<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эфир Крист ТВ</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle, #0a0015, #1a0533);
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-box {
            max-width: 550px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(153,0,255,0.15);
        }
        h1 {
            text-align: center;
            font-size: 32px;
            text-shadow: 0 0 30px #ff00c8;
            color: #ffcc00;
            margin-bottom: 5px;
        }
        .live-badge {
            text-align: center;
            color: #00ff64;
            font-size: 18px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .msg {
            background: rgba(255,255,255,0.06);
            padding: 12px 16px;
            border-radius: 16px;
            margin: 10px 0;
            border-left: 4px solid #ff00c8;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .msg .text {
            font-size: 18px;
            word-wrap: break-word;
        }
        .msg .time {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .msg .name {
            font-size: 14px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-area input:focus {
            border-color: #ff00c8;
            box-shadow: 0 0 20px rgba(255,0,200,0.2);
        }
        .input-area input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .input-area button {
            padding: 14px 30px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, #ff00c8, #9900ff);
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(255,0,200,0.3);
        }
        .input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255,0,200,0.5);
        }
        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            color: #aaaaff;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .back:hover {
            background: rgba(255,0,200,0.1);
            border-color: #ff00c8;
        }
        .clear-btn {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
        }
        .clear-btn:hover {
            color: #ff4444;
        }
        .only-you-badge {
            text-align: center;
            font-size: 13px;
            color: #ffcc00;
            margin-top: 8px;
            opacity: 0.6;
        }
        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            .messages { height: 300px; }
            .input-area input { font-size: 14px; padding: 12px 14px; }
            .input-area button { padding: 12px 20px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <h1>📺 Эфир Крист ТВ</h1>
        <div class="live-badge">🔴 В ЭФИРЕ СЕЙЧАС</div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напишите сообщение..." maxlength="200">
            <button id="sendBtn" onclick="sendMessage()">📨</button>
        </div>
        <div class="only-you-badge">🔒 Только ведущий может писать</div>
        <button class="clear-btn" onclick="clearChat()">🗑 Очистить чат</button>

        <a href="index.html" class="back">← На главную</a>
    </div>

    <script>
        // ========== ВАШИ НАСТРОЙКИ ИЗ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAnoE-1f7vKY0r3y9tLTKEASLF83yxwW9A",
            authDomain: "krist-tv.firebaseapp.com",
            databaseURL: "https://krist-tv-default-rtdb.firebaseio.com",
            projectId: "krist-tv",
            storageBucket: "krist-tv.firebasestorage.app",
            messagingSenderId: "199509403595",
            appId: "1:199509403595:web:ae365f2c67cc70d8da384e",
            measurementId: "G-E9D29865EC"
        };
        // ================================================

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        // ========== ЗАЩИТА: ТОЛЬКО ВЫ ==========
        // Код-пароль для входа в режим ведущего
        const SECRET_CODE = "krist2026"; // Можете поменять на свой пароль

        let isAuthorized = false;

        function checkAuthorization() {
            // Просим ввести пароль при первом открытии
            if (!isAuthorized) {
                const pass = prompt("🔐 Введите код ведущего:");
                if (pass === SECRET_CODE) {
                    isAuthorized = true;
                    document.getElementById('msgInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('msgInput').placeholder = "Напишите сообщение...";
                    document.querySelector('.only-you-badge').textContent = '👑 Режим ведущего: вы можете писать';
                    document.querySelector('.only-you-badge').style.color = '#00ff64';
                } else {
                    alert('❌ Неверный код! Вы можете только читать.');
                    document.getElementById('msgInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    document.getElementById('msgInput').placeholder = "⛔ Только чтение";
                }
            }
        }

        // Проверяем при загрузке
        setTimeout(checkAuthorization, 500);

        // ========== ОТПРАВКА СООБЩЕНИЙ ==========
        function sendMessage() {
            if (!isAuthorized) {
                alert('⛔ Вы не можете писать. Войдите как ведущий.');
                return;
            }

            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const now = new Date();
            const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            messagesRef.push({
                name: '🎤 Крист ТВ',
                text: text,
                time: time,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = '';
            input.focus();
        }

        // ========== ПОЛУЧЕНИЕ СООБЩЕНИЙ ==========
        messagesRef.orderByChild('timestamp').limitToLast(50).on('child_added', function(snapshot) {
            const msg = snapshot.val();
            addMessageToChat(msg);
        });

        function addMessageToChat(msg) {
            const container = document.getElementById('messages');
            const placeholder = container.querySelector('.placeholder');
            if (placeholder) placeholder.remove();

            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
                <div class="name">${msg.name || 'Крист ТВ'}</div>
                <div class="text">${msg.text}</div>
                <div class="time">${msg.time}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            while (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }
        }

        // ========== ОЧИСТКА ЧАТА ==========
        function clearChat() {
            if (!isAuthorized) {
                alert('⛔ Только ведущий может очищать чат!');
                return;
            }
            if (confirm('🗑 Очистить все сообщения для всех?')) {
                messagesRef.remove().then(() => {
                    document.getElementById('messages').innerHTML = '';
                    const div = document.createElement('div');
                    div.className = 'msg placeholder';
                    div.style.cssText = 'border-left-color:#888; opacity:0.4; text-align:center; font-size:14px;';
                    div.innerHTML = '<div class="text">💬 Чат очищен. Напишите новое сообщение!</div>';
                    document.getElementById('messages').appendChild(div);
                });
            }
        }

        // Отправка по Enter
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Заглушка при загрузке
        const div = document.createElement('div');
        div.className = 'msg placeholder';
        div.style.cssText = 'border-left-color:#888; opacity:0.4; text-align:center; font-size:14px;';
        div.innerHTML = '<div class="text">💬 Сообщения загружаются...</div>';
        document.getElementById('messages').appendChild(div);
    </script>
</body>
</html>
